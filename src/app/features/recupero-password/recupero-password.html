<div class="auth-wrapper">
  <div class="card auth-card">

    <div class="auth-header">
      <span class="logo-beta">Beta</span><span class="logo-books">Books</span>
      <p>Recupera la tua password</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="submit()">

      <div class="form-group">
        <label>Email</label>
        <input type="email" formControlName="email" placeholder="la-tua@email.com">
        @if (email.invalid && email.touched) {
          <span class="error-msg">Inserisci un'email valida</span>
        }
      </div>

      @if (errore) {
        <div class="alert-error">{{ errore }}</div>
      }

      <button type="submit" class="btn btn-primary w-full" [disabled]="loading">
        {{ loading ? 'Invio email in corso...' : 'Conferma' }}
      </button>

    </form>

   

  </div>
</div>
