<div class="auth-wrapper">
  <div class="card auth-card">

    <div class="auth-header">
      <span class="logo-beta">Beta</span><span class="logo-books">Books</span>
      <p>Accedi al tuo account</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="submit()">

      <div class="form-group">
        <label>Email</label>
        <input type="email" formControlName="email" placeholder="la-tua@email.com">
        @if (email.invalid && email.touched) {
          <span class="error-msg">Inserisci un'email valida</span>
        }
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" formControlName="password" placeholder="••••••••">
      </div>

      @if (errore) {
        <div class="alert-error">{{ errore }}</div>
      }

      <button type="submit" class="btn btn-primary w-full" [disabled]="loading">
        {{ loading ? 'Accesso...' : 'Accedi' }}
      </button>

    </form>

    <p class="auth-footer">
      Non hai un account?
      <a routerLink="/auth/register">Registrati</a>
    </p>

  </div>
</div>
